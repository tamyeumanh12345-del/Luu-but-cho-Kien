<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Write Something For Me 💌</title>

  <link rel="preconnect"
  href="https://fonts.googleapis.com">

  <link rel="preconnect"
  href="https://fonts.gstatic.com"
  crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600;700&display=swap"
  rel="stylesheet">

  <style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Quicksand', sans-serif;

  background:linear-gradient(
    to bottom,
    #dfefff,
    #f5faff,
    #edf7ff
  );

  overflow-x:hidden;

  min-height:100vh;
}

/* INTRO */

#intro{

  position:fixed;

  top:0;
  left:0;

  width:100%;
  height:100vh;

  background:linear-gradient(
    to bottom,
    #ffdce8,
    #eef5ff,
    #edf8ff
  );

  display:flex;

  justify-content:center;
  align-items:center;

  z-index:99999;

  transition:1.5s ease;
}

.intro-content{
  text-align:center;
}

.intro-content h1{

  font-size:5rem;

  color:#6ea8ff;

  font-family:'Pacifico', cursive;

  margin-bottom:20px;
}

.intro-content p{

  font-size:1.3rem;

  color:#666;

  animation:blink 2s infinite;
}

@keyframes blink{

  0%,100%{
    opacity:1;
  }

  50%{
    opacity:.3;
  }

}

/* HERO */

.hero{

  min-height:80vh;

  display:flex;

  flex-direction:column;

  justify-content:center;
  align-items:center;

  text-align:center;

  padding:40px;
}

.hero h1{

  font-size:5rem;

  color:#6ea8ff;

  font-family:'Pacifico', cursive;

  margin-bottom:30px;
}

.hero p{

  max-width:850px;

  font-size:1.3rem;

  line-height:2;

  color:#555;
}

/* FORM */

.form-section{

  display:flex;

  justify-content:center;
  align-items:center;

  padding:100px 20px;
}

.form-box{

  width:700px;

  background:white;

  padding:50px;

  border-radius:35px;

  box-shadow:0 15px 40px rgba(0,0,0,.08);

  text-align:center;
}

.form-box h2{

  font-size:3rem;

  color:#6ea8ff;

  margin-bottom:35px;

  font-family:'Pacifico', cursive;
}

.form-box input,
.form-box textarea{

  width:100%;

  border:none;

  background:#eef5ff;

  padding:22px;

  border-radius:20px;

  margin-bottom:20px;

  font-size:1rem;

  font-family:'Quicksand', sans-serif;

  outline:none;
}

.form-box textarea{

  height:220px;

  resize:none;
}

.form-box button{

  padding:18px 45px;

  border:none;

  border-radius:50px;

  background:#6ea8ff;

  color:white;

  font-size:1rem;

  cursor:pointer;

  transition:.3s;
}

.form-box button:hover{

  transform:scale(1.05);

  background:#4f8fff;
}

#status{

  margin-top:20px;

  color:#6ea8ff;
}

/* HEARTS */

.heart{

  position:fixed;

  bottom:-20px;

  color:#6ea8ff;

  animation:floatUp linear forwards;

  pointer-events:none;

  z-index:999;
}

@keyframes floatUp{

  0%{
    transform:translateY(0);
    opacity:1;
  }

  100%{
    transform:translateY(-120vh);
    opacity:0;
  }

}

/* MOBILE */

@media(max-width:768px){

  .intro-content h1{
    font-size:3rem;
  }

  .hero h1{
    font-size:3rem;
  }

  .hero p{
    font-size:1rem;
  }

  .form-box{

    width:100%;

    padding:30px;
  }

  .form-box h2{
    font-size:2rem;
  }

}

  </style>

</head>

<body>

<!-- INTRO -->

<div id="intro">

  <div class="intro-content">

    <h1>Lưu bút cho Kin ✨</h1>

    <p>
      click anywhere to enter
    </p>

  </div>

</div>

<!-- MUSIC -->

<audio id="music" loop>

  <source src="music.mp3"
  type="audio/mpeg">

</audio>

<!-- HERO -->

<section class="hero">

  <h1>
    Write Something For Me 💌
  </h1>

  <p>
    Có thể sau này chúng ta sẽ không còn gặp nhau mỗi ngày nữa.
    Nhưng mình hy vọng chúng ta sẽ luôn nhớ về nhau
    bằng những ký ức đẹp nhất.
  </p>

</section>

<!-- FORM -->

<section class="form-section">

  <div class="form-box">

    <h2>
      Leave Your Memory 🌷
    </h2>

    <input
    type="text"
    id="name"
    placeholder="Tên của bạn ✨">

    <textarea
    id="message"
    placeholder="Viết điều bạn muốn nhắn 💖"></textarea>

    <button onclick="sendMessage()">

      Send 💌

    </button>

    <p id="status"></p>

  </div>

</section>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getFirestore,
  collection,
  addDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyDNGr1HMpZ6uajNpq-ZkrUAKHTiBHG9T2I",
  authDomain: "luu-but-52647.firebaseapp.com",
  projectId: "luu-but-52647",
  storageBucket: "luu-but-52647.firebasestorage.app",
  messagingSenderId: "569736243796",
  appId: "1:569736243796:web:0c37363f469fe6d0f39bc1",
  measurementId: "G-NTKD0DY13X"
};

const app =
initializeApp(firebaseConfig);

const db =
getFirestore(app);

/* INTRO + MUSIC */

const music =
document.getElementById("music");

music.volume = 0.15;

const intro =
document.getElementById("intro");

intro.addEventListener("click", () => {

  music.play();

  intro.style.opacity = "0";

  setTimeout(() => {

    intro.style.display = "none";

  }, 1500);

});

/* SEND MESSAGE */

window.sendMessage = async function(){

  const name =
  document.getElementById("name").value;

  const message =
  document.getElementById("message").value;

  const status =
  document.getElementById("status");

  if(name === "" || message === ""){

    status.innerHTML =
    "Please fill everything 💔";

    return;
  }

  try{

    await addDoc(
      collection(db, "messages"),
      {

      name:name,

      message:message,

      createdAt:new Date()

    });

    status.innerHTML =
    "Sent successfully 💖";

    document.getElementById("name").value = "";

    document.getElementById("message").value = "";

  }catch(error){

    status.innerHTML =
    "Something went wrong 💔";

  }

}

/* HEART EFFECT */

setInterval(() => {

  const heart =
  document.createElement("div");

  heart.classList.add("heart");

  heart.innerHTML = "❤";

  heart.style.left =
  Math.random() * 100 + "vw";

  heart.style.fontSize =
  Math.random() * 20 + 15 + "px";

  heart.style.animationDuration =
  Math.random() * 3 + 4 + "s";

  document.body.appendChild(heart);

  setTimeout(() => {

    heart.remove();

  }, 7000);

}, 500);

</script>

</body>
</html>
